<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト作成（管理者用）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   デザイントークン（管理画面：濃紺ヘッダーの業務ツール仕様）
   ============================================================ */
:root{
  --bg:#F5F6F8; --surface:#FFFFFF;
  --border:#E3E6EB; --border-strong:#C7CCD4;
  --ink:#1B2430; --sub:#68707E;
  --accent:#1E3A5F; --accent-hover:#274A78;
  --head-dark:#1B2A40;            /* ヘッダーバー */
  --sat:#2563AB; --sun:#C0392B;
  --m2:#1E8A55; --m1:#2563AB; --m3:#B07B1E; --m4:#C0392B;
  --warn-bg:#FDF3F2;
  --shadow:0 1px 3px rgba(16,24,40,.07), 0 1px 2px rgba(16,24,40,.04);
}
*{box-sizing:border-box;}
html,body{margin:0; padding:0;}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Noto Sans JP','Hiragino Sans',Meiryo,sans-serif;
  font-size:14px; line-height:1.6; padding:0 18px 48px;
  font-feature-settings:"palt";
}

/* ---------- ヘッダーバー（濃紺） ---------- */
header{
  background:var(--head-dark); color:#fff;
  margin:0 -18px 16px; padding:13px 22px;
  display:flex; align-items:baseline; gap:16px; flex-wrap:wrap;
  box-shadow:var(--shadow);
}
header h1{font-size:16.5px; margin:0; font-weight:700; letter-spacing:.05em;}
header .sub{font-size:12px; color:#9FB0C6; font-weight:500;}

/* ---------- ツールバー ---------- */
.toolbar{
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  box-shadow:var(--shadow);
  padding:11px 14px; margin-bottom:12px;
  display:flex; flex-wrap:wrap; gap:10px 20px; align-items:center;
}
.toolbar .group{display:flex; align-items:center; gap:7px;}
.toolbar label{font-size:12.5px; font-weight:600; color:var(--sub);}
input[type="month"], input[type="number"]{
  border:1px solid var(--border-strong); border-radius:6px;
  padding:5px 8px; font-size:13.5px; font-family:inherit; background:var(--surface);
  font-feature-settings:"tnum";
}
input[type="month"]:focus, input[type="number"]:focus{
  outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(30,58,95,.12);
}
input[type="number"]{width:60px;}
button{
  border:1px solid var(--border-strong); background:var(--surface); color:var(--ink);
  border-radius:6px; padding:7px 15px; font-size:13px; font-weight:600;
  font-family:inherit; cursor:pointer; box-shadow:var(--shadow);
  transition:background .12s;
}
button:hover{background:#EEF1F5;}
button.primary{background:var(--accent); color:#fff; border-color:var(--accent);}
button.primary:hover{background:var(--accent-hover);}
button:disabled{border-color:var(--border); color:#B5BCC6; background:var(--surface); cursor:default; box-shadow:none;}

.banner{
  background:#EDF1F7; color:var(--accent); border:1px solid #D6DEE9;
  border-radius:6px; padding:8px 13px; font-size:13px; font-weight:600; margin-bottom:12px;
}
.banner.error{background:#FDF1EF; color:var(--sun); border-color:#F0D5D1;}

/* ---------- 情報パネル ---------- */
.info-row{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px;}
.panel{
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  box-shadow:var(--shadow);
  padding:10px 14px; font-size:13px; flex:1; min-width:250px;
}
.panel b{
  font-size:11.5px; display:block; color:var(--sub); letter-spacing:.08em;
  border-bottom:1px solid var(--border); margin-bottom:6px; padding-bottom:4px;
}
.panel.warn{border-color:#EBC4BE; background:var(--warn-bg);}
.panel.warn b{color:var(--sun); border-color:#EBC4BE;}
.panel ul{margin:4px 0 0; padding-left:18px;}
.panel li{margin:2px 0;}

/* ---------- シフト表 ---------- */
.table-scroll{
  overflow-x:auto; background:var(--surface);
  border:1px solid var(--border); border-radius:8px; box-shadow:var(--shadow);
}
table{border-collapse:collapse; width:max-content; min-width:100%; font-feature-settings:"tnum";}
th,td{
  border:1px solid var(--border); padding:4px 6px; text-align:center;
  font-size:13px; white-space:nowrap; background:var(--surface);
}
thead th{background:#F0F2F5; font-weight:700; color:var(--ink);}
th.date-sat{color:var(--sat);} th.date-sun{color:var(--sun);}
th .holiday{display:block; font-size:9px; font-weight:600; color:var(--sub);}

/* 名前列を左に固定 */
.col-name{
  position:sticky; left:0; z-index:2;
  min-width:100px; text-align:left; background:var(--surface);
  border-right:2px solid var(--border-strong);
  font-weight:500;
}
thead .col-name{background:#F0F2F5; z-index:3; font-weight:700;}
.col-name .job{font-size:10px; color:var(--sub); margin-left:5px; font-weight:500;}

/* 職種の区切り行 */
tr.job-head td{
  background:#E8ECF2; color:var(--accent); text-align:left; font-weight:700;
  letter-spacing:.06em; border-top:2px solid var(--border-strong); font-size:12px;
}

/* 希望記号の色 */
.p-m2{color:var(--m2); font-weight:700;}
.p-m1{color:var(--m1); font-weight:700;}
.p-m3{color:var(--m3); font-weight:700;}
.p-m4{color:var(--m4); font-weight:700;}
.p-none{color:#C2C8D0;}

/* 割り当て済みセル：濃紺地に白 */
td.cell{cursor:pointer; min-width:46px; user-select:none; transition:background .1s;}
td.cell:hover{background:#EEF1F5;}
td.cell.assigned{background:var(--accent);}
td.cell.assigned:hover{background:var(--accent-hover);}
td.cell.assigned span{color:#fff !important;}
td.cell.violation{box-shadow:inset 0 0 0 2px var(--m4);}
tr.unsubmitted td{background:#FAFBFC; color:#B5BCC6;}
tr.unsubmitted .col-name{color:#B5BCC6;}

/* 必要人数入力行・充足状況行 */
td.req-cell{background:#F7F9FB;}
td.req-cell input{width:44px; text-align:center; padding:2px;}
td.status-ok{color:var(--m2); font-weight:700; background:#F4FAF6;}
td.status-short{color:var(--m4); font-weight:700; background:var(--warn-bg);}

td.total-col{border-left:2px solid var(--border-strong); font-weight:700;}

.note{font-size:12px; color:var(--sub); margin-top:10px;}

/* ---------- 他ページへのリンク・バージョン表示 ---------- */
.admin-links{
  text-align:center; padding:18px 0 4px; font-size:12px; color:#AEB4BC;
}
.admin-links a{color:#8B93A0; text-decoration:none; border-bottom:1px dotted #C7CCD4;}
.admin-links a:hover{color:var(--accent);}
.admin-links .sep{margin:0 10px; color:#D5D9DE;}
.version-footer{
  text-align:center; padding:2px 0 20px; font-size:10.5px; color:#C7CCD4;
}
.hidden{display:none !important;}

/* ---------- 凡例（画面では控えめ、印刷時は表のすぐ上に表示） ---------- */
.legend-row{
  display:flex; justify-content:space-between; align-items:center;
  gap:10px; flex-wrap:wrap; margin-bottom:10px;
}
.legend{
  display:flex; flex-wrap:wrap; gap:6px 18px;
  font-size:12.5px; color:var(--sub); font-weight:500;
  padding:8px 12px; flex:1;
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  box-shadow:var(--shadow);
}
.legend b{font-size:15px; margin-right:2px;}
.legend .m2{color:var(--m2);} .legend .m1{color:var(--m1);}
.legend .s1{color:var(--m3);} .legend .b1{color:var(--m4);}
.legend .assigned-sample{
  display:inline-block; width:14px; height:14px; background:var(--accent);
  border-radius:2px; vertical-align:-2px; margin-right:3px;
}
.created-at{
  font-size:12.5px; color:var(--sub); font-weight:600; white-space:nowrap;
  padding:8px 12px; background:var(--surface); border:1px solid var(--border);
  border-radius:8px; box-shadow:var(--shadow);
}

/* ---------- 印刷時：表だけを出す ---------- */
@media print{
  .toolbar, .info-row, .banner, .note, header .sub{display:none !important;}
  body{padding:0; background:#fff;}
  header{background:#fff; color:#000; box-shadow:none; margin:0; padding:4px 0; border-bottom:1px solid #000;}
  .legend, .created-at{
    display:flex !important; box-shadow:none; border:1px solid #000;
    background:#fff; border-radius:0; font-size:10.5px; padding:5px 8px;
  }
  .legend-row{margin-bottom:6px;}
  .legend .assigned-sample{background:#333 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
  .table-scroll{border:none; overflow:visible; box-shadow:none; border-radius:0;}
  table{width:100%;}
  th,td{font-size:10.5px; padding:2px 3px;}
  td.cell.assigned{background:#333 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
}

/* ---------- ログイン画面 ---------- */
#loginScreen{
  position:fixed; inset:0; background:var(--bg);
  display:flex; align-items:center; justify-content:center; z-index:100;
}
.login-box{
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  box-shadow:var(--shadow); padding:32px 28px; width:100%; max-width:320px; text-align:center;
}
.login-box h2{font-size:15px; font-weight:700; color:var(--accent); margin:0 0 18px;}
.login-box input{
  width:100%; font-size:20px; letter-spacing:.3em; text-align:center;
  padding:11px; border:1px solid var(--border-strong); border-radius:6px;
  font-family:inherit; margin-bottom:12px; box-sizing:border-box;
}
.login-box input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(30,58,95,.12);}
.login-box button{
  width:100%; background:var(--accent); color:#fff; border:none; border-radius:6px;
  padding:11px 0; font-size:14.5px; font-weight:700; font-family:inherit; cursor:pointer;
}
.login-box button:hover{background:var(--accent-hover);}
.login-box .err{color:var(--m4); font-size:12.5px; font-weight:600; min-height:18px; margin-top:8px;}

@media print{ #loginScreen{display:none !important;} }
</style>
</head>
<body>

<!-- ログイン画面（パスワードで保護） -->
<div id="loginScreen">
  <div class="login-box">
    <h2>シフト作成ページ（管理者用）</h2>
    <input type="password" id="loginPw" inputmode="numeric" placeholder="パスワード" autofocus>
    <button onclick="checkLogin()">開く</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div id="appRoot" class="hidden">

<header>
  <h1>シフト作成（管理者用）</h1>
  <span class="sub" id="modeLabel"></span>
  <span class="sub" id="printTitle"></span>
</header>

<div id="bannerArea"></div>

<!-- ツールバー -->
<div class="toolbar">
  <div class="group">
    <label>開始月</label>
    <input type="month" id="monthFromInput">
    <label>〜終了月</label>
    <input type="month" id="monthToInput">
    <button onclick="loadMonth()">読み込み</button>
  </div>
  <div class="group" id="demoGenGroup" style="display:none">
    <button onclick="genDemoData()">デモデータ生成</button>
  </div>
  <div class="group">
    <label>必要人数（全日）</label>
    <input type="number" id="defaultReq" value="5" min="0" max="21">
    <button onclick="applyDefaultReq()">全日に反映</button>
  </div>
  <div class="group">
    <label><input type="checkbox" id="ruleConsecutive" checked onchange="saveState();renderAll()"> 連続勤務させない</label>
  </div>
  <div class="group">
    <button class="primary" onclick="autoAssign()">自動割り当て</button>
    <button onclick="clearAssign()">割り当てクリア</button>
    <button id="undoBtn" onclick="undoAssign()" disabled>元に戻す</button>
  </div>
  <div class="group">
    <button onclick="copyTsv()">表をコピー</button>
    <button onclick="window.print()">印刷</button>
  </div>
  <div class="group">
    <button onclick="saveBackup()">バックアップ保存</button>
    <button onclick="document.getElementById('backupFile').click()">バックアップ読込</button>
    <input type="file" id="backupFile" accept="application/json" style="display:none" onchange="loadBackup(event)">
  </div>
  <div class="group" id="archiveGroup" style="display:none">
    <button onclick="archiveResponses()">この期間をアーカイブして削除</button>
    <button onclick="purgeArchive()">アーカイブを完全に削除</button>
  </div>
</div>

<!-- 未提出者・警告 -->
<div class="info-row">
  <div class="panel" id="unsubmittedPanel"><b>未提出者</b><span id="unsubmittedList">—</span></div>
  <div class="panel" id="commentPanel"><b>コメント</b><div id="commentList">—</div></div>
  <div class="panel warn hidden" id="warnPanel"><b>警告</b><ul id="warnList"></ul></div>
</div>

<!-- 凡例＋作成日（画面にも表示、印刷にも含まれる） -->
<div class="legend-row">
  <div class="legend">
    <span><b class="m2">◎</b>出勤したい</span>
    <span><b class="m1">〇</b>出勤できる</span>
    <span><b class="s1">△</b>できれば避けたい</span>
    <span><b class="b1">×</b>出勤できない</span>
    <span><span class="assigned-sample"></span>割り当て済み（出勤）</span>
  </div>
  <div class="created-at" id="createdAt">作成日：—</div>
</div>

<!-- シフト表 -->
<div class="table-scroll">
  <table id="shiftTable"></table>
</div>
<p class="note">
  セルをクリック（タップ）すると出勤の割り当て／解除ができます。黒＝出勤。
  「自動割り当て」は ×以外の人から、◎＞〇＞△ の優先度と回数の公平さを考慮して選びます。実行するたびに組み直されます。
</p>

<!-- 他ページへのリンク -->
<div class="admin-links">
  <a href="index.html">職員入力画面</a>
  <span class="sep">|</span>
  <a href="settings.html">募集設定</a>
</div>
<div class="version-footer" id="versionFooter"></div>

<script src="config.js"></script>
<script src="staff.js"></script>
<script>
/* ============================================================
   祝日データ（①と同じ二段構え）
   ============================================================ */
const HOLIDAYS_FALLBACK = {
  "2026-01-01":"元日","2026-01-12":"成人の日","2026-02-11":"建国記念の日",
  "2026-02-23":"天皇誕生日","2026-03-20":"春分の日","2026-04-29":"昭和の日",
  "2026-05-03":"憲法記念日","2026-05-04":"みどりの日","2026-05-05":"こどもの日",
  "2026-05-06":"振替休日","2026-07-20":"海の日","2026-08-11":"山の日",
  "2026-09-21":"敬老の日","2026-09-22":"国民の休日","2026-09-23":"秋分の日",
  "2026-10-12":"スポーツの日","2026-11-03":"文化の日","2026-11-23":"勤労感謝の日",
  "2027-01-01":"元日","2027-01-11":"成人の日","2027-02-11":"建国記念の日",
  "2027-02-23":"天皇誕生日","2027-03-21":"春分の日","2027-03-22":"振替休日",
  "2027-04-29":"昭和の日","2027-05-03":"憲法記念日","2027-05-04":"みどりの日",
  "2027-05-05":"こどもの日","2027-07-19":"海の日","2027-08-11":"山の日",
  "2027-09-20":"敬老の日","2027-09-23":"秋分の日","2027-10-11":"スポーツの日",
  "2027-11-03":"文化の日","2027-11-23":"勤労感謝の日"
};

/* ============================================================
   アプリの状態
   ============================================================ */
let demoMode = false;
let holidays = {};
let month = "";          // その回を識別する合言葉（＝開始月と同じ）
let monthFrom = "";      // "2026-09"
let monthTo = "";        // "2026-12"（単月の場合はmonthFromと同じ）
let targetDays = [];     // [{date,day,dow,holiday,month}]
let responses = {};      // staffId → {answers, comment, sentAt}
let req = {};            // date → 必要人数
let assignment = {};     // date → {staffId:true}

const DOW_JA = ["日","月","火","水","木","金","土"];
const MARK_CLASS = {"◎":"p-m2","〇":"p-m1","△":"p-m3","×":"p-m4"};
// 画面の隅に表示する目印。ファイルを差し替えたら、この文字も変える。
// 差し替えたはずなのに古い表示のままなら、ブラウザのキャッシュが原因と分かる。
const APP_VERSION = "2026-07-13a";
const PREF_SCORE = {"◎":3,"〇":2,"△":1};   // 自動割り当て時の優先度

/* ============================================================
   ログイン（画面側の簡易パスワード保護）
   ------------------------------------------------------------
   ・正解すると localStorage に印を付け、同じ端末・同じブラウザ
     なら次回から自動的に入れるようにする（毎回の入力を省く）。
   ・注意：あくまで「うっかり開き」を防ぐ簡易的な鍵。
     本気で守りたい情報は置かない前提。
   ============================================================ */
const ADMIN_PASSWORD = "525";
const LOGIN_KEY = "shift_admin_authed";

function checkLogin(){
  const input = document.getElementById("loginPw").value;
  if(input === ADMIN_PASSWORD){
    localStorage.setItem(LOGIN_KEY, "1");
    unlockApp();
  }else{
    document.getElementById("loginErr").textContent = "パスワードが違います";
    document.getElementById("loginPw").value = "";
    document.getElementById("loginPw").focus();
  }
}
function unlockApp(){
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("appRoot").classList.remove("hidden");
  init();  // ロック解除後にはじめてアプリ本体を起動する
}
// Enterキーでも送信できるようにする
document.getElementById("loginPw").addEventListener("keydown", e=>{
  if(e.key === "Enter") checkLogin();
});

// 既にログイン済みの端末なら、ログイン画面を出さず即起動
if(localStorage.getItem(LOGIN_KEY) === "1"){
  unlockApp();
}

/* ============================================================
   起動
   ============================================================ */
async function init(){
  document.getElementById("versionFooter").textContent = "app version: " + APP_VERSION;

  try{
    const res = await fetch("https://holidays-jp.github.io/api/v1/date.json");
    holidays = await res.json();
  }catch(e){ holidays = HOLIDAYS_FALLBACK; }

  if(!CONFIG.GAS_URL){
    demoMode = true;
    document.getElementById("modeLabel").textContent = "デモモード（GAS未接続）";
    document.getElementById("demoGenGroup").style.display = "";
    document.getElementById("monthFromInput").value = "2026-09";
    document.getElementById("monthToInput").value = "2026-12";
    showBanner("", "デモモード：9月〜12月の4ヶ月分で表示しています。「デモデータ生成」を押すと職員A〜Uの希望がランダムに作られます。");
    loadMonth();
  }else{
    document.getElementById("archiveGroup").style.display = "";  // 本番接続時のみアーカイブ操作を表示
    // GASから現在の募集設定を取得して、その期間を初期表示
    try{
      const res = await fetch(CONFIG.GAS_URL + "?action=settings");
      const s = await res.json();
      if(!s.ok) throw new Error(s.error);
      document.getElementById("monthFromInput").value = s.monthFrom;
      document.getElementById("monthToInput").value = s.monthTo;
      await loadMonth();
    }catch(e){
      showBanner("error", "サーバーに接続できませんでした：" + e);
    }
  }
}

/* ============================================================
   期間の読み込み：対象日を作り、回答と保存済みの作業状態を復元
   ============================================================ */
async function loadMonth(){
  monthFrom = document.getElementById("monthFromInput").value;
  monthTo = document.getElementById("monthToInput").value || monthFrom;
  if(!monthFrom){ alert("開始月を選んでください"); return; }
  if(monthTo < monthFrom){ alert("終了月は開始月と同じか、それより後にしてください"); return; }

  // 保存・復元のキーは「開始月」を、その回を識別する合言葉として使う
  month = monthFrom;

  buildTargetDays();

  // --- 回答の取得 ---
  if(!demoMode){
    try{
      const res = await fetch(CONFIG.GAS_URL + "?action=responses&month=" + month);
      const data = await res.json();
      if(!data.ok) throw new Error(data.error);
      responses = {};
      data.responses.forEach(r => { responses[r.staffId] = r; });
      showBanner("", `${data.responses.length} / ${STAFF.length} 名の回答を読み込みました。`);
    }catch(e){
      showBanner("error", "回答の読み込みに失敗しました：" + e);
      responses = {};
    }
  }
  // （デモモードでは「デモデータ生成」ボタンで responses を作る）

  restoreState();   // この期間の必要人数・割り当てを端末から復元
  renderAll();
}

function nextMonthStr(ym){
  const [y,m] = ym.split("-").map(Number);
  const d = new Date(y, m, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}

function buildTargetDays(){
  targetDays = [];
  let cur = monthFrom;
  let guard = 0;

  while(cur <= monthTo && guard < 24){
    const [y,m] = cur.split("-").map(Number);
    const last = new Date(y, m, 0).getDate();
    for(let d=1; d<=last; d++){
      const dt = new Date(y, m-1, d);
      const dow = dt.getDay();
      const key = `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const holiday = holidays[key] || null;
      if(dow===0 || dow===6 || holiday){
        targetDays.push({date:key, day:d, dow:dow, holiday:holiday, month:cur});
      }
    }
    cur = nextMonthStr(cur);
    guard++;
  }
}

/* ============================================================
   デモデータ生成（職員A〜Uのランダム希望を作る）
   ============================================================ */
function genDemoData(){
  responses = {};
  // 21人中3人はわざと「未提出」にする／2人は日曜すべて×の想定（ママさん役）
  const unsubmitted = new Set([STAFF[6].id, STAFF[13].id, STAFF[20].id]);
  const sundayNG = new Set([STAFF[1].id, STAFF[9].id]);

  STAFF.forEach(s=>{
    if(unsubmitted.has(s.id)) return;
    const answers = {};
    targetDays.forEach(t=>{
      if(sundayNG.has(s.id) && (t.dow===0 || t.holiday)){
        answers[t.date] = "×";
        return;
      }
      // 出現率：◎15% 〇45% △20% ×20%
      const r = Math.random();
      answers[t.date] = r<0.15 ? "◎" : r<0.60 ? "〇" : r<0.80 ? "△" : "×";
    });
    responses[s.id] = {
      answers: answers,
      comment: Math.random()<0.2 ? "第3週は午前のみ可" : "",
      sentAt: "demo"
    };
  });
  assignment = {};   // 希望を作り直したら割り当てもリセット
  saveState();
  renderAll();
  showBanner("", "デモデータを生成しました（未提出3名、日曜不可2名を含む）。「自動割り当て」を試してください。");
}

/* ============================================================
   自動割り当てアルゴリズム
   ------------------------------------------------------------
   考え方（貪欲法＝グリーディ法：その場その場で最善を選ぶ方式）
   1. 候補者が少ない日（=難しい日）から先に埋める
   2. 各日について、出られる人に点数を付けて上位から採用
        点数 = 希望の強さ(◎3 〇2 △1)×10
              − すでに割り当てた回数×7   ←回数の公平化
              + 小さな乱数               ←同点のくじ引き
   3. ×の人、未提出の人、（設定ONなら）前日・翌日に勤務がある人は除外
   ============================================================ */
function autoAssign(){
  // 既に何か割り当てがある状態で実行すると上書きされてしまうため、
  // うっかり事故を防ぐための確認ダイアログ。
  const hasExisting = Object.keys(assignment).some(d => Object.keys(assignment[d]).length > 0);
  if(hasExisting && !confirm("現在の割り当てを上書きして、自動で組み直します。よろしいですか？\n（「元に戻す」で1回分だけ戻せます）")) {
    return;
  }
  pushHistory();  // 上書きする直前の状態を1つ保存しておく

  assignment = {};
  const counts = {};   // staffId → 割り当て回数
  STAFF.forEach(s=>counts[s.id]=0);

  // 「難しい日」順に並べ替え（×以外で回答済みの人数が少ない日が先）
  const order = [...targetDays].sort((a,b)=>{
    const ca = eligibleCount(a.date), cb = eligibleCount(b.date);
    return ca - cb || a.date.localeCompare(b.date);
  });

  const ruleOn = document.getElementById("ruleConsecutive").checked;

  order.forEach(t=>{
    const need = req[t.date] ?? 0;
    assignment[t.date] = assignment[t.date] || {};

    const cands = STAFF
      .filter(s=>{
        const r = responses[s.id];
        if(!r) return false;                        // 未提出
        const mark = r.answers[t.date];
        if(!mark || mark==="×") return false;       // ×は除外
        if(ruleOn && hasAdjacentAssign(s.id, t.date)) return false; // 連続禁止
        return true;
      })
      .map(s=>({
        id: s.id,
        score: PREF_SCORE[responses[s.id].answers[t.date]]*10
               - counts[s.id]*7
               + Math.random()*3
      }))
      .sort((a,b)=>b.score - a.score);

    cands.slice(0, need).forEach(c=>{
      assignment[t.date][c.id] = true;
      counts[c.id]++;
    });
  });

  saveState();
  renderAll();
}

function eligibleCount(date){
  return STAFF.filter(s=>{
    const r = responses[s.id];
    return r && r.answers[date] && r.answers[date] !== "×";
  }).length;
}

// 前日または翌日（暦の上で隣り合う日）に割り当て済みか？
// 土日ペアや9月の5連休のような並びをここで検出する
function hasAdjacentAssign(staffId, date){
  const d = new Date(date);
  for(const diff of [-1, 1]){
    const nd = new Date(d.getTime() + diff*86400000);
    const key = `${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,"0")}-${String(nd.getDate()).padStart(2,"0")}`;
    if(assignment[key] && assignment[key][staffId]) return true;
  }
  return false;
}

function clearAssign(){
  if(!confirm("割り当てをすべて解除しますか？（希望データは消えません。「元に戻す」で1回分だけ戻せます）")) return;
  pushHistory();
  assignment = {};
  saveState(); renderAll();
}

/* ============================================================
   元に戻す（1手だけ）
   ------------------------------------------------------------
   ・「自動割り当て」「割り当てクリア」を実行する直前の状態を
     1つだけ履歴に保存しておき、ボタン1つで復元できるようにする。
   ・履歴は月ごとに端末へ保存されるので、ページを閉じても
     直前の1回分は残る（ただし新しい上書きが起きると更新される）。
   ============================================================ */
let assignHistory = null;   // {req, assignment} の直前スナップショット

function pushHistory(){
  // JSON.parse(JSON.stringify(...)) で「値のコピー」を作る。
  // 単に代入するだけだと同じデータを指す「参照」になってしまい、
  // 後から書き換えると過去の記録まで一緒に変わってしまうため。
  assignHistory = {
    req: JSON.parse(JSON.stringify(req)),
    assignment: JSON.parse(JSON.stringify(assignment))
  };
  if(month) localStorage.setItem("shift_admin_undo_"+month, JSON.stringify(assignHistory));
  document.getElementById("undoBtn").disabled = false;
}

function undoAssign(){
  if(!assignHistory){
    alert("戻せる操作がありません");
    return;
  }
  if(!confirm("直前の状態に戻します。今の内容は失われます。よろしいですか？")) return;

  req = JSON.parse(JSON.stringify(assignHistory.req));
  assignment = JSON.parse(JSON.stringify(assignHistory.assignment));
  assignHistory = null;
  document.getElementById("undoBtn").disabled = true;
  if(month) localStorage.removeItem("shift_admin_undo_"+month);

  saveState();
  renderAll();
}

/* ============================================================
   手動修正：セルのクリックで割り当てのON/OFF
   ============================================================ */
function toggleCell(staffId, date){
  const r = responses[staffId];
  const assigned = assignment[date] && assignment[date][staffId];

  if(!assigned){
    if(!r && !confirm("この職員は未提出です。割り当てますか？")) return;
    if(r && r.answers[date]==="×" && !confirm("この日は「×（出勤できない）」の希望です。割り当てますか？")) return;
    assignment[date] = assignment[date] || {};
    assignment[date][staffId] = true;
  }else{
    delete assignment[date][staffId];
  }
  saveState(); renderAll();
}

/* ============================================================
   画面描画
   ============================================================ */
function periodLabel(){
  if(!monthFrom) return "";
  const [yFrom, mFrom] = monthFrom.split("-");
  const [yTo, mTo] = (monthTo || monthFrom).split("-");
  if(monthFrom === monthTo || !monthTo){
    return `${yFrom}年${Number(mFrom)}月分`;
  }
  if(yFrom === yTo){
    return `${yFrom}年${Number(mFrom)}月〜${Number(mTo)}月分`;
  }
  return `${yFrom}年${Number(mFrom)}月〜${yTo}年${Number(mTo)}月分`;
}

function renderAll(){
  renderTable();
  renderPanels();
  document.getElementById("printTitle").textContent = periodLabel();

  // 作成日＝この画面（表）を今見ている日。印刷するたびに最新の日付になる。
  const today = new Date();
  const w = ["日","月","火","水","木","金","土"][today.getDay()];
  document.getElementById("createdAt").textContent =
    `作成日：${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日(${w})`;
}

function renderTable(){
  const tbl = document.getElementById("shiftTable");
  tbl.innerHTML = "";
  if(targetDays.length===0) return;

  // ---- 見出し3行（日付／必要人数／充足状況） ----
  const thead = document.createElement("thead");

  const tr1 = document.createElement("tr");
  tr1.innerHTML = `<th class="col-name">職員</th>`;
  const spansMultiple = monthFrom !== monthTo;
  targetDays.forEach(t=>{
    const isSun = (t.dow===0 || t.holiday);
    const dayLabel = spansMultiple ? `${Number(t.month.split("-")[1])}/${t.day}` : `${t.day}`;
    tr1.innerHTML += `<th class="${isSun?"date-sun":"date-sat"}">${dayLabel}(${DOW_JA[t.dow]})`+
                     `${t.holiday?`<span class="holiday">${t.holiday}</span>`:""}</th>`;
  });
  tr1.innerHTML += `<th class="total-col">計</th>`;
  thead.appendChild(tr1);

  const tr2 = document.createElement("tr");
  tr2.innerHTML = `<th class="col-name">必要人数</th>`;
  targetDays.forEach(t=>{
    const v = req[t.date] ?? "";
    tr2.innerHTML += `<td class="req-cell"><input type="number" min="0" max="21" value="${v}"
                       onchange="setReq('${t.date}', this.value)"></td>`;
  });
  tr2.innerHTML += `<td class="total-col">—</td>`;
  thead.appendChild(tr2);

  const tr3 = document.createElement("tr");
  tr3.innerHTML = `<th class="col-name">割当/必要</th>`;
  targetDays.forEach(t=>{
    const n = countAssigned(t.date);
    const need = req[t.date] ?? 0;
    const ok = n >= need;
    tr3.innerHTML += `<td class="${ok?"status-ok":"status-short"}">${n}/${need}</td>`;
  });
  tr3.innerHTML += `<td class="total-col">—</td>`;
  thead.appendChild(tr3);
  tbl.appendChild(thead);

  // ---- 本体：職種ごとにグループ表示 ----
  const tbody = document.createElement("tbody");
  ["ST","OT","PT"].forEach(job=>{
    const trh = document.createElement("tr");
    trh.className = "job-head";
    trh.innerHTML = `<td class="col-name">${job}</td><td colspan="${targetDays.length+1}"></td>`;
    tbody.appendChild(trh);

    STAFF.filter(s=>s.job===job).forEach(s=>{
      const r = responses[s.id];
      const tr = document.createElement("tr");
      if(!r) tr.className = "unsubmitted";

      let html = `<td class="col-name">${s.name}${r?"":`<span class="job">未提出</span>`}</td>`;
      let myCount = 0;

      targetDays.forEach(t=>{
        const mark = r ? (r.answers[t.date] || "") : "";
        const assigned = assignment[t.date] && assignment[t.date][s.id];
        if(assigned) myCount++;
        // ×なのに割り当て、または連続勤務は赤枠で知らせる
        const bad = assigned && (mark==="×" ||
                    (document.getElementById("ruleConsecutive").checked && hasAdjacentAssignExcl(s.id, t.date)));
        html += `<td class="cell ${assigned?"assigned":""} ${bad?"violation":""}"
                     onclick="toggleCell('${s.id}','${t.date}')">`+
                `<span class="${MARK_CLASS[mark]||"p-none"}">${mark || "―"}</span></td>`;
      });

      html += `<td class="total-col">${myCount}</td>`;
      tr.innerHTML = html;
      tbody.appendChild(tr);
    });
  });
  tbl.appendChild(tbody);
}

// 連続チェック（表示用）：この日を除いた隣接日を確認
function hasAdjacentAssignExcl(staffId, date){
  const d = new Date(date);
  for(const diff of [-1,1]){
    const nd = new Date(d.getTime() + diff*86400000);
    const key = `${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,"0")}-${String(nd.getDate()).padStart(2,"0")}`;
    if(assignment[key] && assignment[key][staffId]) return true;
  }
  return false;
}

function renderPanels(){
  // 未提出者
  const un = STAFF.filter(s=>!responses[s.id]).map(s=>`${s.name}(${s.job})`);
  document.getElementById("unsubmittedList").textContent =
    un.length ? un.join("、") : "なし（全員提出済み）";

  // コメント
  const cm = STAFF.filter(s=>responses[s.id] && responses[s.id].comment)
                  .map(s=>`<li>${s.name}：${responses[s.id].comment}</li>`);
  document.getElementById("commentList").innerHTML =
    cm.length ? `<ul>${cm.join("")}</ul>` : "なし";

  // 警告
  const warns = [];
  targetDays.forEach(t=>{
    const n = countAssigned(t.date), need = req[t.date] ?? 0;
    if(n < need) warns.push(`${t.day}日(${DOW_JA[t.dow]})：人数不足（${n}/${need}）`);
  });
  STAFF.forEach(s=>{
    targetDays.forEach(t=>{
      const a = assignment[t.date] && assignment[t.date][s.id];
      if(!a) return;
      const mark = responses[s.id] ? responses[s.id].answers[t.date] : "";
      if(mark==="×") warns.push(`${s.name}：${t.day}日は×希望ですが割り当てられています`);
    });
  });
  const panel = document.getElementById("warnPanel");
  const list = document.getElementById("warnList");
  if(warns.length){
    panel.classList.remove("hidden");
    list.innerHTML = warns.map(w=>`<li>${w}</li>`).join("");
  }else{
    panel.classList.add("hidden");
  }
}

function countAssigned(date){
  return assignment[date] ? Object.keys(assignment[date]).length : 0;
}

/* ============================================================
   必要人数の設定
   ============================================================ */
function setReq(date, val){
  req[date] = Number(val) || 0;
  saveState(); renderAll();
}
function applyDefaultReq(){
  const v = Number(document.getElementById("defaultReq").value) || 0;
  targetDays.forEach(t=>req[t.date]=v);
  saveState(); renderAll();
}

/* ============================================================
   作業状態の保存・復元（月ごとに端末内へ自動保存）
   ============================================================ */
function saveState(){
  if(!month) return;
  localStorage.setItem("shift_admin_"+month, JSON.stringify({
    req: req,
    assignment: assignment,
    rule: document.getElementById("ruleConsecutive").checked,
    demoResponses: demoMode ? responses : undefined  // デモの希望も残す
  }));
}
function restoreState(){
  req = {}; assignment = {};
  const raw = localStorage.getItem("shift_admin_"+month);
  if(raw){
    try{
      const d = JSON.parse(raw);
      req = d.req || {};
      assignment = d.assignment || {};
      document.getElementById("ruleConsecutive").checked = d.rule !== false;
      if(demoMode && d.demoResponses) responses = d.demoResponses;
    }catch(e){ /* 壊れた保存は無視 */ }
  }

  // この月の「元に戻す」履歴が端末に残っていれば復元する
  assignHistory = null;
  const undoRaw = localStorage.getItem("shift_admin_undo_"+month);
  if(undoRaw){
    try{ assignHistory = JSON.parse(undoRaw); }catch(e){ assignHistory = null; }
  }
  document.getElementById("undoBtn").disabled = !assignHistory;
}

/* ============================================================
   TSV出力（Excelに貼り付けられる形式でクリップボードへ）
   ============================================================ */
function copyTsv(){
  let out = "職員\t職種\t" + targetDays.map(t=>`${t.day}(${DOW_JA[t.dow]})`).join("\t") + "\t計\n";
  ["ST","OT","PT"].forEach(job=>{
    STAFF.filter(s=>s.job===job).forEach(s=>{
      let cnt = 0;
      const cells = targetDays.map(t=>{
        const a = assignment[t.date] && assignment[t.date][s.id];
        if(a) cnt++;
        return a ? "出" : "";
      });
      out += `${s.name}\t${s.job}\t${cells.join("\t")}\t${cnt}\n`;
    });
  });
  navigator.clipboard.writeText(out).then(
    ()=>showBanner("", "表をコピーしました。Excelなどに貼り付けできます。"),
    ()=>showBanner("error", "コピーに失敗しました。ブラウザの権限設定を確認してください。")
  );
}

function showBanner(type, text){
  document.getElementById("bannerArea").innerHTML =
    `<div class="banner ${type}">${text}</div>`;
}

/* ============================================================
   バックアップの書き出し／読み込み
   ------------------------------------------------------------
   ・今の作業内容（対象期間・必要人数・割り当て）を1つのファイルに
     まとめて、端末に保存できるようにする。
   ・その端末に何かあっても、このファイルさえあれば復元できる保険。
   ============================================================ */
function saveBackup(){
  const backup = {
    savedAt: new Date().toISOString(),
    monthFrom: monthFrom,
    monthTo: monthTo,
    req: req,
    assignment: assignment
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `shift_backup_${monthFrom}_${nowStamp()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showBanner("", "バックアップを保存しました。ダウンロードフォルダをご確認ください。");
}

function loadBackup(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const backup = JSON.parse(reader.result);
      if(!backup.monthFrom){ throw new Error("バックアップファイルの形式が正しくありません"); }
      if(!confirm(`${backup.monthFrom}〜${backup.monthTo || backup.monthFrom} のバックアップ（保存日時: ${backup.savedAt}）を読み込みます。今の内容は上書きされます。よろしいですか？`)) return;

      document.getElementById("monthFromInput").value = backup.monthFrom;
      document.getElementById("monthToInput").value = backup.monthTo || backup.monthFrom;
      monthFrom = backup.monthFrom;
      monthTo = backup.monthTo || backup.monthFrom;
      month = monthFrom;
      req = backup.req || {};
      assignment = backup.assignment || {};

      buildTargetDays();
      saveState();
      renderAll();
      showBanner("ok", "バックアップを読み込みました。");
    }catch(e){
      showBanner("error", "読み込みに失敗しました：" + e.message);
    }
  };
  reader.readAsText(file);
  ev.target.value = "";   // 同じファイルを連続で選んでも読み込めるようにリセット
}

function nowStamp(){
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
}

/* ============================================================
   アーカイブ（古い回答データの整理）
   ------------------------------------------------------------
   ・締切が過ぎて使い終わった期間の回答を「回答_アーカイブ」シートへ
     移動し、メインの「回答」シートを軽く保つ。
   ・実際にスプレッドシートを書き換える操作なので、管理パスワード
     （E2の値）による確認を必須にしている。
   ============================================================ */
async function archiveResponses(){
  if(demoMode){ alert("デモモードではアーカイブ操作はできません"); return; }
  if(!confirm(`今表示している期間（${monthFrom}）の回答を「回答_アーカイブ」シートへ移動し、元のシートから削除します。よろしいですか？`)) return;

  const password = prompt("管理パスワードを入力してください（スプレッドシート設定シートE2の値）");
  if(password === null) return;

  try{
    const res = await fetch(CONFIG.GAS_URL, {
      method: "POST",
      body: JSON.stringify({ action:"archiveResponses", month: monthFrom, password: password })
    });
    const result = await res.json();
    if(result.ok){
      showBanner("ok", result.message);
      await loadMonth();  // 表を最新状態に読み直す（回答が空になっているはず）
    }else{
      showBanner("error", "アーカイブに失敗しました：" + result.error);
    }
  }catch(e){
    showBanner("error", "通信エラー：" + e);
  }
}

async function purgeArchive(){
  if(demoMode){ alert("デモモードではアーカイブ操作はできません"); return; }
  if(!confirm("「回答_アーカイブ」シートの中身を完全に削除します。この操作は取り消せません。本当によろしいですか？")) return;
  if(!confirm("念のためもう一度確認します。本当にアーカイブを完全に削除しますか？")) return;

  const password = prompt("管理パスワードを入力してください（スプレッドシート設定シートE2の値）");
  if(password === null) return;

  try{
    const res = await fetch(CONFIG.GAS_URL, {
      method: "POST",
      body: JSON.stringify({ action:"purgeArchive", password: password })
    });
    const result = await res.json();
    if(result.ok){
      showBanner("ok", result.message);
    }else{
      showBanner("error", "削除に失敗しました：" + result.error);
    }
  }catch(e){
    showBanner("error", "通信エラー：" + e);
  }
}
